spring:
  application:
    name: ai-analyzer-service
  datasource:
    url: ${AI_DB_URL}
    username: ${AI_DB_USERNAME}
    password: ${AI_DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

    hikari:
      read-only: true
      maximum-pool-size: ${AI_DB_POOL_SIZE:10}
      minimum-idle: ${AI_DB_MIN_IDLE:2}
      connection-timeout: 30000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          fetch_size: 500
        default_batch_fetch_size: 100
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
server:
  shutdown: graceful
  port: ${PORT:8080}
  address: 0.0.0.0
ai:
  ranking:
    project-id: ${AI_PROJECT_ID:0}
    result-limit: ${AI_RESULT_LIMIT:20}
    embedding-dimension: 300
    recency-period: PER_MONTH
    bug-history-weight: 0.80
    bug-history:
      recency: UNIQUE_BUG_DISTANCE
      half-life-days: 180
      query-expansion: SO_TAG_GRAPH
      expansion-max-tags: 6
      expansion-weight: 0.25
      term-weight: SO_PROJECT_BLEND
      project-weight: 1.00
